<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="header">
            <span id="header-title">Gemma Chat</span>
            <button id="schedule-btn" title="Scheduled Tasks">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Tasks</span>
            </button>
        </div>
        <div id="messages">
            <div id="welcome" class="welcome">
                <div class="welcome-icon">G</div>
                <h2>Gemma 4</h2>
                <p>Running locally via Ollama</p>
                <div class="welcome-capabilities">
                    <span>Run commands</span>
                    <span>Read & write files</span>
                    <span>Create documents</span>
                    <span>Schedule tasks</span>
                </div>
            </div>
        </div>
        <div id="input-bar">
            <button id="think-toggle" title="Toggle thinking mode">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/>
                    <line x1="9" y1="21" x2="15" y2="21"/>
                    <line x1="10" y1="24" x2="14" y2="24"/>
                </svg>
                <span>Think</span>
            </button>
            <div id="input-wrapper">
                <textarea id="input" rows="1" placeholder="Ask Gemma to do something..." autofocus></textarea>
            </div>
            <button id="send-btn" title="Send message">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
            <button id="stop-btn" title="Stop generation" style="display:none">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="6" width="12" height="12" rx="2"/>
                </svg>
            </button>
        </div>
        <div id="status-bar">
            <span id="status-text"></span>
        </div>

        <!-- Schedule Panel -->
        <div id="schedule-panel">
            <div class="schedule-panel-header">
                <h3>Scheduled Tasks</h3>
                <button id="schedule-close">&times;</button>
            </div>
            <div id="schedule-list"></div>
        </div>
    </div>
    <script src="js/marked.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
